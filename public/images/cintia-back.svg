<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 500" width="300" height="500">
  <!-- Body -->
  <rect x="100" y="180" width="100" height="200" rx="10" fill="#E8967A"/>
  <!-- Dress -->
  <path d="M80 250 Q150 240 220 250 L240 420 Q150 430 60 420 Z" fill="#FF4081"/>
  <!-- Arms -->
  <rect x="60" y="200" width="40" height="120" rx="15" fill="#D4836B" transform="rotate(-5 80 200)"/>
  <rect x="200" y="200" width="40" height="120" rx="15" fill="#D4836B" transform="rotate(5 220 200)"/>
  <!-- Neck -->
  <rect x="130" y="150" width="40" height="40" rx="5" fill="#D4836B"/>
  <!-- Head (back view) -->
  <circle cx="150" cy="120" r="55" fill="#D4836B"/>
  <!-- Hair (long, from behind) -->
  <path d="M95 90 Q90 60 110 40 Q150 20 190 40 Q210 60 205 90 L210 200 Q150 220 90 200 Z" fill="#1A1A2E"/>
  <!-- Hair detail strands -->
  <path d="M100 100 Q95 150 90 200" stroke="#0D0D1A" stroke-width="2" fill="none"/>
  <path d="M130 80 Q125 140 120 200" stroke="#0D0D1A" stroke-width="2" fill="none"/>
  <path d="M170 80 Q175 140 180 200" stroke="#0D0D1A" stroke-width="2" fill="none"/>
  <path d="M200 100 Q205 150 210 200" stroke="#0D0D1A" stroke-width="2" fill="none"/>
  <!-- Legs -->
  <rect x="110" y="400" width="30" height="80" rx="10" fill="#D4836B"/>
  <rect x="160" y="400" width="30" height="80" rx="10" fill="#D4836B"/>
  <!-- Shoes -->
  <ellipse cx="125" cy="480" rx="20" ry="8" fill="#FF4081"/>
  <ellipse cx="175" cy="480" rx="20" ry="8" fill="#FF4081"/>
</svg>