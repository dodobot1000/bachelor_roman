<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 500" width="300" height="500">
  <!-- Body -->
  <rect x="100" y="180" width="100" height="200" rx="10" fill="#E8967A"/>
  <!-- Dress -->
  <path d="M80 250 Q150 240 220 250 L240 420 Q150 430 60 420 Z" fill="#FF4081"/>
  <!-- Arms (one pointing at viewer) -->
  <rect x="60" y="200" width="40" height="120" rx="15" fill="#D4836B" transform="rotate(-15 80 200)"/>
  <path d="M200 210 L260 180" stroke="#D4836B" stroke-width="30" stroke-linecap="round"/>
  <!-- Pointing finger -->
  <circle cx="268" cy="176" r="8" fill="#D4836B"/>
  <!-- Neck -->
  <rect x="130" y="150" width="40" height="40" rx="5" fill="#D4836B"/>
  <!-- Head (facing forward) -->
  <circle cx="150" cy="120" r="55" fill="#D4836B"/>
  <!-- Hair (front view, framing face) -->
  <path d="M95 90 Q90 50 115 30 Q150 10 185 30 Q210 50 205 90 L210 160 Q205 170 200 160 L200 100 Q150 80 100 100 L100 160 Q95 170 90 160 Z" fill="#1A1A2E"/>
  <!-- Eyes (angry/surprised) -->
  <ellipse cx="130" cy="115" rx="10" ry="12" fill="white"/>
  <ellipse cx="170" cy="115" rx="10" ry="12" fill="white"/>
  <circle cx="132" cy="115" r="6" fill="#1A1A2E"/>
  <circle cx="172" cy="115" r="6" fill="#1A1A2E"/>
  <!-- Angry eyebrows -->
  <path d="M115 98 Q130 92 142 100" stroke="#1A1A2E" stroke-width="3" fill="none"/>
  <path d="M158 100 Q170 92 185 98" stroke="#1A1A2E" stroke-width="3" fill="none"/>
  <!-- Mouth (angry/shouting) -->
  <ellipse cx="150" cy="145" rx="15" ry="10" fill="#C0392B"/>
  <path d="M138 143 Q150 138 162 143" stroke="#fff" stroke-width="2" fill="none"/>
  <!-- Blush -->
  <ellipse cx="118" cy="130" rx="10" ry="6" fill="#FF8A80" opacity="0.5"/>
  <ellipse cx="182" cy="130" rx="10" ry="6" fill="#FF8A80" opacity="0.5"/>
  <!-- Legs -->
  <rect x="110" y="400" width="30" height="80" rx="10" fill="#D4836B"/>
  <rect x="160" y="400" width="30" height="80" rx="10" fill="#D4836B"/>
  <!-- Shoes -->
  <ellipse cx="125" cy="480" rx="20" ry="8" fill="#FF4081"/>
  <ellipse cx="175" cy="480" rx="20" ry="8" fill="#FF4081"/>
</svg>